<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برامج بلس</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

body{
background:#121212;
color:#fff;
font-family:'Cairo',sans-serif;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:20px 10px;
}

.iphone-card{
width:100%;
max-width:420px;
background:rgba(20,20,20,0.9);
border-radius:40px;
overflow:hidden;
box-shadow:0 0 40px rgba(139,69,19,0.3);
border:1px solid rgba(139,69,19,0.3);
}

.slider-container{
height:260px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
inset:0;
opacity:0;
transition:1s;
background-size:cover;
background-position:center;
}

.slide.active{opacity:1;}

.slider-text{
position:absolute;
bottom:20px;
right:20px;
z-index:10;
}

.app-bar{
background:rgba(30,30,30,0.9);
padding:16px;
display:flex;
align-items:center;
gap:12px;
border-top:1px solid rgba(139,69,19,0.2);
}

.app-icon{
width:65px;
height:65px;
border-radius:18px;
}

.install-btn{
background:linear-gradient(270deg,#ffffff,#38bdf8,#a855f7);
background-size:600% 600%;
animation:liquidColor 6s ease infinite;
padding:10px 22px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
border:none;
color:#000;
}

.small-note{
font-size:10px;
color:#38bdf8;
margin-top:3px;
}

.description{
width:100%;
max-width:420px;
margin-top:20px;
background:rgba(139,69,19,0.08);
border-radius:20px;
padding:18px;
border:1px dashed rgba(139,69,19,0.4);
}

.color-liquid{
background:linear-gradient(270deg,#ffffff,#38bdf8,#22c55e);
background-size:600% 600%;
animation:liquidColor 6s ease infinite;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

.liquid-link{
background:linear-gradient(270deg,#38bdf8,#22c55e,#38bdf8);
background-size:600% 600%;
animation:liquidColor 5s ease infinite;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:bold;
}

@keyframes liquidColor{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.install-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.popup-box{
position:relative;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(8px);
padding:25px;
border-radius:20px;
text-align:center;
max-width:320px;
border:2px solid #38bdf8;
animation:glow 2s infinite;
}

@keyframes glow{
0%{box-shadow:0 0 5px #38bdf8}
50%{box-shadow:0 0 20px #38bdf8}
100%{box-shadow:0 0 5px #38bdf8}
}

.popup-btn{
margin-top:15px;
background:#38bdf8;
padding:10px 25px;
border-radius:25px;
font-weight:bold;
color:#000;
cursor:pointer;
border:none;
}

.close-btn{
position:absolute;
top:8px;
right:10px;
background:none;
border:none;
color:#fff;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="iphone-card">

<div class="slider-container">
<div class="slide active" style="background-image:url('https://i.ibb.co/rGrYGPDD/IMG-1876.png')"></div>
<div class="slide" style="background-image:url('https://i.ibb.co/TMB510Pb/IMG-1874.png')"></div>

<div class="slider-text">
<h2 class="text-2xl font-black">برامج بلس</h2>
<p class="text-pink-400 text-xs font-bold">قناة اترهيب الرسمية</p>
</div>
</div>

<!-- كلاش اوف كلانس -->
<div class="app-bar">
<img src="https://i.ibb.co/WvZxhnXy/IMG-3174.png" class="app-icon">
<div class="flex-1 text-right">
<h3 class="font-bold">كلاش أوف كلانس</h3>
</div>
<button onclick="installApp('https://github.com/freooe/Es/releases/download/M/manifest.plist')" class="install-btn">تثبيت</button>
</div>

<!-- كلاش رويال -->
<div class="app-bar">
<img src="https://i.ibb.co/P7Cn14c/IMG-3175.png" class="app-icon">
<div class="flex-1 text-right">
<h3 class="font-bold">كلاش رويال</h3>
</div>
<button onclick="installApp('https://github.com/freooe/All/releases/download/Did/manifest.plist')" class="install-btn">تثبيت</button>
</div>

</div>

<div class="description">
<h4 class="color-liquid">عالم اترهيب</h4>

<p>
حل مشكلة مطور مؤسسة غير موثوق فيه
<a class="liquid-link" href="https://t.me/atraheeb7/55" target="_blank">
اضغط هنا شاهد الشرح
</a>
</p>

</div>

<div class="install-popup" id="popup">
<div class="popup-box">

<button class="close-btn" onclick="closePopup()">✕</button>

<p style="font-size:14px">
عند التثبيت سيظهر لك<br>
<b>مطور مؤسسة غير موثوق</b><br><br>
لحل هذه المشكلة اقرأ الشرح<br>
في أسفل الموقع
</p>

<button class="popup-btn" onclick="startInstall()">تثبيت الآن</button>

</div>
</div>

<script>
let installLink="";

function installApp(link){
installLink=link;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function startInstall(){
window.location.href="itms-services://?action=download-manifest&url="+installLink;
setTimeout(function(){
window.location.href="https://t.me/atraheebb";
},1500);
}

let currentSlide=0;
const slides=document.querySelectorAll('.slide');

setInterval(()=>{
slides[currentSlide].classList.remove('active');
currentSlide=(currentSlide+1)%slides.length;
slides[currentSlide].classList.add('active');
},4000);
</script>

</body>
</html>
